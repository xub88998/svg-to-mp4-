<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to MP4 Converter</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.min.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">
        <h1>SVG to MP4 Converter</h1>
        <p>সুপার ফাস্ট কনভারশন, কোনো কোয়ালিটি লস নেই!</p>

        <div class="upload-section">
            <input type="file" id="svgInput" accept=".svg">
            
            <div class="options">
                <label for="quality">Quality:</label>
                <select id="quality">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>

            <button id="convertBtn">Convert to MP4</button>
        </div>

        <div id="status" class="status-text"></div>
        <a id="downloadLink" style="display: none;" class="download-btn">Download MP4</a>
    </div>

    <script src="main.js"></script>
</body>
</html>
